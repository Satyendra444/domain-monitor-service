name: Domain Monitor

on:
  schedule:
    # Triggers every 10 minutes. Job loops internally every 2 min x 5 runs
    # to guarantee checks even when GitHub delays the cron trigger.
    - cron: '*/10 * * * *'

  workflow_dispatch:

jobs:
  check-domains:
    name: Check Domains
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run domain check every 2 minutes for 10 minutes
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          CC_EMAIL: ${{ secrets.CC_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
          CHECK_INTERVAL_MINUTES: '2'
        run: |
          for i in $(seq 1 5); do
            echo "--- Run $i/5 at $(date -u) ---"
            node src/run-once.js
            if [ $i -lt 5 ]; then
              sleep 120
            fi
          done
