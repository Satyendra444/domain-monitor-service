name: Domain Monitor

on:
  schedule:
    # Every 10 minutes 24x7 (GitHub minimum is 5 min).
    # Inside the job we loop every 1 minute for 10 iterations to achieve per-minute checks.
    - cron: '*/10 * * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  check-domains:
    name: Check Domains
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run domain check every minute for 10 minutes
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          CC_EMAIL: ${{ secrets.CC_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
          CHECK_INTERVAL_MINUTES: '1'
        run: |
          for i in $(seq 1 10); do
            echo "--- Run $i of 10 at $(date -u) ---"
            node src/run-once.js
            if [ $i -lt 10 ]; then
              sleep 60
            fi
          done
